components:
  schemas:
    ProductionOrderCreateRequest:
      type: object
      properties:
        order_type:
          type: string
          enum: [stock, customer]
        target_location_id:
          type: integer
          nullable: true
        planned_completion_date:
          type: string
          format: date
          nullable: true
        lines:
          type: array
          items:
            $ref: '#/components/schemas/ProductionOrderLineCreateRequest'
      required: [order_type, lines]

    ProductionOrderPatchRequest:
      type: object
      properties:
        customer_name:
          type: string
          nullable: true
        customer_phone:
          type: string
          nullable: true
        customer_email:
          type: string
          nullable: true
        target_location_id:
          type: integer
          nullable: true
        priority:
          type: string
          enum: [low, normal, high, urgent]
        planned_completion_date:
          type: string
          format: date
          nullable: true
        notes:
          type: string
          nullable: true

    ProductionOrderLineCreateRequest:
      type: object
      properties:
        model_id:
          type: integer
          nullable: true
        model_name:
          type: string
        model_sku:
          type: string
          nullable: true
        quantity:
          type: number
        size:
          type: string
          nullable: true
        notes:
          type: string
          nullable: true
      required: [model_name, quantity]

    ProductionBatchCreateRequest:
      type: object
      properties:
        model_id:
          type: integer
        quantity:
          type: number
        planned_start_date:
          type: string
          format: date
          nullable: true
        fabric_type:
          type: string
          nullable: true
        fabric_colors:
          type: array
          items:
            $ref: '#/components/schemas/FabricColorRow'
        selected_sizes:
          type: array
          items:
            type: string
        notes:
          type: string
          nullable: true
      required: [model_id, quantity]

    ProductionBatchUpdateRequest:
      allOf:
        - $ref: '#/components/schemas/ProductionBatchCreateRequest'

    FabricColorRow:
      type: object
      properties:
        color:
          type: string
        rolls:
          type: number
      required: [color, rolls]

    ProductionOrder:
      type: object
      properties:
        id: { type: integer }
        order_number: { type: string }
        order_type: { type: string, enum: [stock, customer] }
        customer_name: { type: string, nullable: true }
        status:
        type: string
        enum: [active, vacation, dismissed, trainee]
        priority: { type: string }
        order_date:
          type: string
          format: date
        planned_completion_date:
          type: string
          format: date
          nullable: true
        total_quantity: { type: number }
        total_lines: { type: number }
        notes: { type: string, nullable: true }

    ProductionOrderLine:
      type: object
      properties:
        id: { type: integer }
        order_id: { type: integer }
        model_id: { type: integer, nullable: true }
        model_name: { type: string }
        model_sku: { type: string, nullable: true }
        size: { type: string, nullable: true }
        quantity: { type: number }
        notes: { type: string, nullable: true }

    ProductionBatch:
      type: object
      properties:
        id: { type: integer }
        batch_number: { type: string }
        status:
          type: string
          enum: [created, preparing, cutting, sewing, overlock, straight_stitch, coverlock, packaging, quality_check, rework, ready, shipped, closed, cancelled]
        quantity: { type: number }
        product_model_id: { type: integer, nullable: true }
        route_card_id: { type: integer, nullable: true }
        sku: { type: string, nullable: true }
        fabric_type: { type: string, nullable: true }
        fabric_color: { type: string, nullable: true }
        size_variants:
          type: object
          nullable: true
          additionalProperties: true
          description: >
            Р”Р»СЏ РЅРѕРІС‹С… РїР°СЂС‚РёР№ РёСЃРїРѕР»СЊР·СѓРµС‚СЃСЏ РѕР±СЉРµРєС‚ РІРёРґР° { selected_sizes: [] }.
            РЎС‚Р°СЂС‹Рµ РїР°СЂС‚РёРё РјРѕРіСѓС‚ С…СЂР°РЅРёС‚СЊ РєР°СЂС‚Сѓ СЂР°Р·РјРµСЂРѕРІ СЃ РєРѕР»РёС‡РµСЃС‚РІР°РјРё.
        created_at:
          type: string
          format: date-time
          nullable: true

    BatchTask:
      type: object
      properties:
        id: { type: integer }
        batch_id: { type: integer }
        stage_id: { type: integer }
        task_type: { type: string }
        assigned_role: { type: string }
        status:
          type: string
          enum: [pending, accepted, in_progress, completed, cancelled]
        accepted_by_employee_id: { type: integer, nullable: true }
        accepted_at: { type: string, format: date-time, nullable: true }
        completed_at: { type: string, format: date-time, nullable: true }
        cancelled_at: { type: string, format: date-time, nullable: true }
        launched_by_user_id: { type: integer, nullable: true }
        launched_at: { type: string, format: date-time, nullable: true }
        notes: { type: string, nullable: true }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    BatchStageTask:
      type: object
      properties:
        id: { type: integer }
        status:
          type: string
          enum: [pending, accepted, in_progress, completed, cancelled]
        task_type: { type: string, nullable: true }
        assigned_role: { type: string, nullable: true }
        launched_at: { type: string, format: date-time, nullable: true }
        accepted_at: { type: string, format: date-time, nullable: true }
        completed_at: { type: string, format: date-time, nullable: true }
        cancelled_at: { type: string, format: date-time, nullable: true }
        notes: { type: string, nullable: true }

    BatchStageSummary:
      allOf:
        - $ref: '#/components/schemas/ProductionStage'
        - type: object
          properties:
            task:
              nullable: true
              allOf:
                - $ref: '#/components/schemas/BatchStageTask'
            entries_count: { type: integer }
            quantity_total: { type: integer }
            latest_entry_at: { type: string, format: date-time, nullable: true }
            is_current: { type: boolean }
            is_completed: { type: boolean }
            entries:
              type: array
              items:
                $ref: '#/components/schemas/TaskEntry'

    BatchStageFlowResponse:
      type: object
      properties:
        batch:
          $ref: '#/components/schemas/ProductionBatch'
        stages:
          type: array
          items:
            $ref: '#/components/schemas/BatchStageSummary'
        current_stage:
          nullable: true
          allOf:
            - $ref: '#/components/schemas/BatchStageSummary'
        current_task:
          nullable: true
          allOf:
            - $ref: '#/components/schemas/BatchStageTask'
        next_stage:
          nullable: true
          allOf:
            - $ref: '#/components/schemas/BatchStageSummary'
        can_transfer_next: { type: boolean }
        completed_stages: { type: integer }
        total_entries: { type: integer }

    ProductionStage:
      type: object
      properties:
        id: { type: integer }
        code: { type: string }
        name: { type: string }
        assigned_role: { type: string }
        sequence_order: { type: integer }
        color: { type: string, nullable: true }
        is_active: { type: boolean }

    StageOperation:
      type: object
      properties:
        id: { type: integer }
        stage_id: { type: integer }
        code: { type: string }
        name: { type: string }
        field_schema:
          type: array
          items:
            type: object
            properties:
              key: { type: string }
              label: { type: string }
              type:
                type: string
                enum: [text, number, select, boolean, date]
              required: { type: boolean }
              source: { type: string, nullable: true }
              placeholder: { type: string, nullable: true }
            additionalProperties: true
        sort_order: { type: integer }
        is_active: { type: boolean }

    ProductionStageWithOperations:
      allOf:
        - $ref: '#/components/schemas/ProductionStage'
        - type: object
          properties:
            operations:
              type: array
              items:
                $ref: '#/components/schemas/StageOperation'

    TaskEntry:
      type: object
      properties:
        id: { type: integer }
        task_id: { type: integer }
        batch_id: { type: integer }
        employee_id: { type: integer }
        stage_id: { type: integer, nullable: true }
        operation_id: { type: integer, nullable: true }
        entry_number: { type: integer }
        quantity: { type: integer, nullable: true }
        data:
          type: object
          additionalProperties: true
        notes: { type: string, nullable: true }
        recorded_at: { type: string, format: date-time }
        source: { type: string, nullable: true }
        operation_code: { type: string, nullable: true }
        operation_name: { type: string, nullable: true }

    TaskEntryCreateRequest:
      type: object
      properties:
        operation_id: { type: integer }
        data:
          type: object
          additionalProperties: true
        notes: { type: string, nullable: true }
      required: [operation_id, data]

    EmployeeActivityLog:
      type: object
