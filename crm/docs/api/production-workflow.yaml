openapi: 3.0.3
info:
  title: Shveyka CRM Production Workflow API
  version: 2.2.0
  description: >
    Production order and batch workflow for the CRM app. This spec keeps the
    manufacturing contract aligned with the current Supabase-backed route
    handlers.
servers:
  - url: /api

tags:
  - name: ProductionOrders
  - name: Batches
  - name: Employees
  - name: Positions
  - name: ProductModels
  - name: RouteCards

paths:
  /production-orders:
    get:
      tags: [ProductionOrders]
      summary: List production orders
      responses:
        "200":
          description: Array of orders.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ProductionOrder"
    post:
      tags: [ProductionOrders]
      summary: Create a production order
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProductionOrderCreateRequest"
      responses:
        "200":
          description: Created order.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductionOrder"

  /production-orders/{id}:
    get:
      tags: [ProductionOrders]
      summary: Get a production order
      parameters:
        - $ref: "#/components/parameters/IdPath"
      responses:
        "200":
          description: Production order payload.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductionOrder"
    patch:
      tags: [ProductionOrders]
      summary: Update a production order
      parameters:
        - $ref: "#/components/parameters/IdPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProductionOrderPatchRequest"
      responses:
        "200":
          description: Updated order.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductionOrder"

  /production-orders/{id}/lines:
    post:
      tags: [ProductionOrders]
      summary: Add a line to a production order
      parameters:
        - $ref: "#/components/parameters/IdPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProductionOrderLineCreateRequest"
      responses:
        "201":
          description: Line created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductionOrderLine"

  /production-orders/{id}/events:
    get:
      tags: [ProductionOrders]
      summary: List production order events
      parameters:
        - $ref: "#/components/parameters/IdPath"
      responses:
        "200":
          description: Event timeline.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ProductionOrderEvent"

  /production-orders/{id}/requirements:
    get:
      tags: [ProductionOrders]
      summary: Calculate material requirements for an order
      parameters:
        - $ref: "#/components/parameters/IdPath"
      responses:
        "200":
          description: MRP snapshot.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RequirementsResponse"

  /production-orders/{id}/{action}:
    post:
      tags: [ProductionOrders]
      summary: Execute a production-order action
      parameters:
        - $ref: "#/components/parameters/IdPath"
        - in: path
          name: action
          required: true
          schema:
            type: string
            enum:
              - approve
              - material_check
              - launch
              - cancel-launch
              - complete
              - transfer_to_warehouse
              - close
              - cancel
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ActionRequest"
      responses:
        "200":
          description: Action completed.

  /production-orders/{id}/batches:
    post:
      tags: [Batches]
      summary: Create a batch under a production order
      parameters:
        - $ref: "#/components/parameters/IdPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BatchCreateRequest"
      responses:
        "201":
          description: Batch created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Batch"

  /batches:
    get:
      tags: [Batches]
      summary: List production batches
      responses:
        "200":
          description: Array of batches.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Batch"
    post:
      tags: [Batches]
      summary: Create a batch
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BatchCreateRequest"
      responses:
        "201":
          description: Batch created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Batch"

  /batches/{id}:
    get:
      tags: [Batches]
      summary: Get a batch
      parameters:
        - $ref: "#/components/parameters/IdPath"
      responses:
        "200":
          description: Batch payload.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Batch"
    put:
      tags: [Batches]
      summary: Update a batch
      parameters:
        - $ref: "#/components/parameters/IdPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BatchUpdateRequest"
      responses:
        "200":
          description: Updated batch.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Batch"
    delete:
      tags: [Batches]
      summary: Delete a batch
      parameters:
        - $ref: "#/components/parameters/IdPath"
      responses:
        "204":
          description: Batch deleted.

  /batches/{id}/launch:
    post:
      tags: [Batches]
      summary: Launch a batch to the next execution stage
      parameters:
        - $ref: "#/components/parameters/IdPath"
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LaunchRequest"
      responses:
        "200":
          description: Launch result with created task.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LaunchResponse"

  /batches/{id}/stages:
    get:
      tags: [Batches]
      summary: Get the batch stage tree and execution summary
      parameters:
        - $ref: "#/components/parameters/IdPath"
      responses:
        "200":
          description: Stage tree.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatchStagesResponse"

  /batches/{id}/pipeline:
    get:
      tags: [Batches]
      summary: Get the batch pipeline snapshot
      parameters:
        - $ref: "#/components/parameters/IdPath"
      responses:
        "200":
          description: Pipeline snapshot.

  /batches/{id}/status:
    patch:
      tags: [Batches]
      summary: Update batch status
      parameters:
        - $ref: "#/components/parameters/IdPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BatchStatusPatchRequest"
      responses:
        "200":
          description: Updated batch.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Batch"

  /employees:
    get:
      tags: [Employees]
      summary: List employees
      responses:
        "200":
          description: Array of employees.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Employee"
    post:
      tags: [Employees]
      summary: Create an employee record
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EmployeeCreateRequest"
      responses:
        "200":
          description: Created employee.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Employee"

  /employees/{id}:
    get:
      tags: [Employees]
      summary: Get an employee
      parameters:
        - $ref: "#/components/parameters/IdPath"
      responses:
        "200":
          description: Employee payload.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Employee"
    post:
      tags: [Employees]
      summary: Update an employee
      parameters:
        - $ref: "#/components/parameters/IdPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EmployeeUpdateRequest"
      responses:
        "200":
          description: Updated employee.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Employee"

  /positions:
    get:
      tags: [Positions]
      summary: List positions
      responses:
        "200":
          description: Array of positions.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Position"
    post:
      tags: [Positions]
      summary: Create a position
      responses:
        "200":
          description: Position created.

  /positions/{id}:
    get:
      tags: [Positions]
      summary: Get a position
      parameters:
        - $ref: "#/components/parameters/IdPath"
      responses:
        "200":
          description: Position payload.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Position"
    post:
      tags: [Positions]
      summary: Update a position
      parameters:
        - $ref: "#/components/parameters/IdPath"
      responses:
        "200":
          description: Position updated.

  /product-models:
    get:
      tags: [ProductModels]
      summary: List product models
      responses:
        "200":
          description: Array of product models.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ProductModel"
    post:
      tags: [ProductModels]
      summary: Create a product model
      responses:
        "200":
          description: Product model created.

  /product-models/{id}:
    get:
      tags: [ProductModels]
      summary: Get a product model
      parameters:
        - $ref: "#/components/parameters/IdPath"
      responses:
        "200":
          description: Product model payload.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductModel"
    post:
      tags: [ProductModels]
      summary: Update a product model
      parameters:
        - $ref: "#/components/parameters/IdPath"
      responses:
        "200":
          description: Product model updated.

  /route-cards:
    get:
      tags: [RouteCards]
      summary: List route cards
      responses:
        "200":
          description: Array of route cards.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/RouteCard"
    post:
      tags: [RouteCards]
      summary: Create a route card
      responses:
        "200":
          description: Route card created.

  /route-cards/{id}:
    get:
      tags: [RouteCards]
      summary: Get a route card
      parameters:
        - $ref: "#/components/parameters/IdPath"
      responses:
        "200":
          description: Route card payload.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RouteCard"
    post:
      tags: [RouteCards]
      summary: Update a route card
      parameters:
        - $ref: "#/components/parameters/IdPath"
      responses:
        "200":
          description: Route card updated.

components:
  parameters:
    IdPath:
      in: path
      name: id
      required: true
      schema:
        type: integer

  schemas:
    ActionRequest:
      type: object
      additionalProperties: true

    ProductionOrder:
      type: object
      properties:
        id:
          type: integer
        status:
          type: string
        order_type:
          type: string
        quantity:
          type: integer
        notes:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time

    ProductionOrderCreateRequest:
      type: object
      required: [quantity]
      properties:
        order_type:
          type: string
        quantity:
          type: integer
        notes:
          type: string

    ProductionOrderPatchRequest:
      type: object
      additionalProperties: true

    ProductionOrderLineCreateRequest:
      type: object
      additionalProperties: true

    ProductionOrderLine:
      type: object
      additionalProperties: true

    ProductionOrderEvent:
      type: object
      additionalProperties: true

    RequirementsResponse:
      type: object
      additionalProperties: true

    Batch:
      type: object
      properties:
        id:
          type: integer
        batch_number:
          type: string
        status:
          type: string
        quantity:
          type: integer
        priority:
          type: string
        fabric_type:
          type: string
          nullable: true
        fabric_color:
          type: string
          nullable: true
        notes:
          type: string
          nullable: true
        product_model_id:
          type: integer
          nullable: true

    BatchCreateRequest:
      type: object
      additionalProperties: true

    BatchUpdateRequest:
      type: object
      additionalProperties: true

    LaunchRequest:
      type: object
      properties:
        note:
          type: string

    LaunchResponse:
      type: object
      additionalProperties: true

    BatchStagesResponse:
      type: object
      additionalProperties: true

    BatchStatusPatchRequest:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [created, cutting, in_progress, completed, cancelled]

    Employee:
      type: object
      properties:
        id:
          type: integer
        full_name:
          type: string
        employee_number:
          type: string
          nullable: true
        position:
          type: string
          nullable: true
        department:
          type: string
          nullable: true
        status:
          type: string

    EmployeeCreateRequest:
      type: object
      additionalProperties: true

    EmployeeUpdateRequest:
      type: object
      additionalProperties: true

    Position:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        is_active:
          type: boolean

    ProductModel:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        sku:
          type: string
          nullable: true

    RouteCard:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        status:
          type: string
        product_model_id:
          type: integer
          nullable: true
