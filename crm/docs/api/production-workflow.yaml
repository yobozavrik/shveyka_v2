        employee_id: { type: integer }
        task_id: { type: integer, nullable: true }
        batch_id: { type: integer, nullable: true }
        batch_number: { type: string, nullable: true }
        stage_code: { type: string, nullable: true }
        stage_name: { type: string, nullable: true }
        action: { type: string }
        quantity: { type: integer, nullable: true }
        created_at: { type: string, format: date-time }

