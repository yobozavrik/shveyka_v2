          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PositionUpdateRequest'
      responses:
        '200':
          description: РџРѕСЃР°РґСѓ РѕРЅРѕРІР»РµРЅРѕ
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Position'
    delete:
      tags: [Positions]
      summary: РџСЂРёС…РѕРІР°С‚Рё РїРѕСЃР°РґСѓ
      description: Soft delete через `is_active=false`; посада не видаляється фізично, щоб старі співробітники не втратили текстове значення `position`.
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        '200':
          description: РџРѕСЃР°РґСѓ РїСЂРёС…РѕРІР°РЅРѕ

  /mobile/auth/login:
