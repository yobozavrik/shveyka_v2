  /positions:
    get:
      tags: [Positions]
      summary: Р”РѕРІС–РґРЅРёРє РїРѕСЃР°Рґ
      description: Повертає довідник посад із `shveyka.positions`; якщо міграцію ще не застосовано, CRM використовує seeded fallback список без помилки.
      responses:
        '200':
          description: РЎРїРёСЃРѕРє РїРѕСЃР°Рґ
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Position'
    post:
      tags: [Positions]
      summary: РЎС‚РІРѕСЂРёС‚Рё РїРѕСЃР°РґСѓ
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PositionCreateRequest'
      responses:
        '201':
          description: РџРѕСЃР°РґСѓ СЃС‚РІРѕСЂРµРЅРѕ
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Position'

  /positions/{id}:
    patch:
      tags: [Positions]
      summary: РћРЅРѕРІРёС‚Рё РїРѕСЃР°РґСѓ
      parameters:
        - in: path
          name: id
